<!DOCTYPE html>
<html>
<head>
    <title>CSS3 Style Property Basic</title>
    <style>
        p:nth-child(1){
            color: red;
        }
        p:nth-child(2){
            color: blue;
        }
        p:nth-child(3){
            color: blueviolet;
        }
        p:nth-child(4){
            color: green;
        }
        
        
        
      
    </style>
</head>

</body>
</html>
